intro: "Frank Rosin ist einer der bekanntesten Sterneköche Deutschlands. Mit seinem Restaurant Rosin in Dorsten-Wulfen hält er seit Jahren Michelin-Sterne. Einem Millionenpublikum bekannt ist er durch «Rosins Restaurants» auf Kabel Eins und als Coach bei «The Taste» auf Sat.1."
