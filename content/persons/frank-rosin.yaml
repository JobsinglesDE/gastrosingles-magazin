faqItems:
  - question: Wie alt ist Frank Rosin?
    answer: "Frank Rosin wurde am 17. Juli 1966 in Dorsten geboren und ist damit Jahrgang 1966."
  - question: Wie viele Michelin-Sterne hat Frank Rosin?
    answer: "Frank Rosin erhielt seinen ersten Michelin-Stern 2003, den zweiten 2011. Sein Restaurant Rosin in Dorsten-Wulfen wurde damit jahrelang mit zwei Sternen ausgezeichnet."
  - question: In welcher TV-Show ist Frank Rosin zu sehen?
    answer: "Frank Rosin ist seit 2009 das Gesicht von «Rosins Restaurants – Ein Sternekoch räumt auf!» auf Kabel Eins. Zudem war er von 2013 bis 2024 Coach bei «The Taste» auf Sat.1."
