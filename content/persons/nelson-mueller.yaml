faqItems:
  - question: Woher kommt Nelson Müller?
    answer: "Nelson Müller wurde am 13. Februar 1979 in Ghana geboren. Mit vier Jahren zog er mit seiner Familie nach Deutschland, wo er in Stuttgart aufwuchs und seine Kochausbildung absolvierte."
  - question: Welches Restaurant hat Nelson Müller?
    answer: "Nelson Müller ist seit September 2009 Inhaber des Restaurants Schote in Essen. Das Schote wurde im November 2011 mit einem Stern im Guide Michelin ausgezeichnet."
  - question: In welchen TV-Sendungen ist Nelson Müller zu sehen?
    answer: "Nelson Müller ist vor allem durch «Nelson Müllers Lebensmittelreport» bekannt, der seit 2013 im ZDF läuft. Darin untersucht er als Koch und Reporter, wie gut bestimmte Lebensmittel wirklich sind."
