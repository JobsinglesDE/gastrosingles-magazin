intro: "Nelson Müller ist Sternekoch und einer der bekanntesten TV-Köche Deutschlands. Der in Ghana geborene und in Stuttgart aufgewachsene Koch führt seit 2009 das Restaurant Schote in Essen, das 2011 mit einem Michelin-Stern ausgezeichnet wurde. Im ZDF moderiert er «Nelson Müllers Lebensmittelreport»."
