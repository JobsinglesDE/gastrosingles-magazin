faqItems:
  - question: Wie alt ist Christian Rach?
    answer: "Christian Rach wurde am 6. Juni 1957 in St. Ingbert im Saarland geboren und ist damit Jahrgang 1957."
  - question: Welches Restaurant hat Christian Rach betrieben?
    answer: "Christian Rach betrieb von 1989 bis 2011 das Tafelhaus in Hamburg-Altona. Das Restaurant wurde ab 1991 jährlich mit einem Michelin-Stern ausgezeichnet."
  - question: In welchen TV-Shows ist Christian Rach aufgetreten?
    answer: "Christian Rach wurde durch «Rach, der Restauranttester» auf RTL (ab 2005) bekannt. Danach war er in «Teufelsküche» (RTL) und als Gast bei «Kitchen Impossible» (VOX) zu sehen."
takeaways:
  - Christian Rach wurde am 6. Juni 1957 in St. Ingbert im Saarland geboren
  - Von 1989 bis 2011 betrieb er das Tafelhaus in Hamburg, das ab 1991 einen Michelin-Stern trug
  - Mit «Rach, der Restauranttester» (RTL, ab 2005) wurde er einem Millionenpublikum bekannt
  - Vor seiner TV-Karriere studierte er Philosophie und Mathematik in Hamburg
