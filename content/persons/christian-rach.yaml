intro: "Christian Rach ist einer der bekanntesten TV-Köche Deutschlands. Mit «Rach, der Restauranttester» rettete er auf RTL angeschlagene Gastronomiebetriebe. In Hamburg betrieb er von 1989 bis 2011 das Tafelhaus — ausgezeichnet mit einem Michelin-Stern."
