faqItems:
  - question: Wer ist Sarah Wiener?
    answer: "Sarah Wiener ist eine deutsch-österreichische Köchin, Autorin und Unternehmerin, geboren am 27. August 1962 in Halle (Westfalen). Als Autodidaktin wurde sie zur bekanntesten Bio-Köchin Deutschlands, gründete 2007 eine eigene Stiftung für Kinderernährung und saß von 2019 bis 2024 für die österreichischen Grünen im Europaparlament."
  - question: Was ist die Sarah Wiener Stiftung?
    answer: "Die Sarah Wiener Stiftung wurde 2007 gegründet und setzt sich für gesunde Ernährung bei Kindern und Jugendlichen ein. Das Kernprojekt «Ich kann kochen!» ist die größte bundesweite Initiative für praktische Ernährungsbildung und hat bislang über eine Million Kinder in mehr als 12.500 Einrichtungen erreicht."
  - question: War Sarah Wiener im Europaparlament?
    answer: "Ja. Von 2019 bis 2024 war Sarah Wiener Mitglied des Europäischen Parlaments und vertrat dabei die österreichischen Grünen. Ihre Arbeitsschwerpunkte lagen auf nachhaltiger Landwirtschaft und gesunder Ernährung."
