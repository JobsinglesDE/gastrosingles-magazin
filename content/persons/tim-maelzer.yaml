faqItems:
  - question: Wie alt ist Tim Mälzer?
    answer: "Tim Mälzer wurde am 22. Januar 1971 in Elmshorn geboren und ist damit Jahrgang 1971."
  - question: Welches Restaurant hat Tim Mälzer?
    answer: "Tim Mälzer betreibt seit 2009 die Bullerei im Hamburger Schanzenviertel. Zuvor übernahm er 2002 «Das Weiße Haus» am Museumshafen Övelgönne."
  - question: In welcher TV-Show ist Tim Mälzer zu sehen?
