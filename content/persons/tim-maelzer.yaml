intro: "Tim Mälzer ist einer der bekanntesten TV-Köche Deutschlands. Seit 2016 tritt der gebürtige Elmshorner in der VOX-Sendung «Kitchen Impossible» gegen Kollegen an. In Hamburg betreibt er seit 2009 das Restaurant Bullerei."
