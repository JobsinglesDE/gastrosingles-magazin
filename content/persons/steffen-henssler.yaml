faqItems:
  - question: Wie alt ist Steffen Henssler?
    answer: "Steffen Henssler wurde am 27. September 1972 in Neuenbürg im Schwarzwald geboren und ist damit Jahrgang 1972."
  - question: Welche Restaurants hat Steffen Henssler?
    answer: "Steffen Henssler betreibt in Hamburg das Restaurant Henssler Henssler (seit 2001) sowie die Ahoi-Kette (seit 2017). 2023 eröffnete er mit seinem Bruder «Happi by Henssler» in Bremen."
  - question: In welcher TV-Show ist Steffen Henssler zu sehen?
    answer: "Seit 2013 ist Steffen Henssler das Gesicht von «Grill den Henssler» auf VOX, wo Prominente gegen ihn ankochen. Zuvor moderierte er von 2010 bis 2013 «Topfgeldjäger» auf VOX."
