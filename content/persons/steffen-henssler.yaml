intro: "Steffen Henssler ist einer der bekanntesten TV-Köche Deutschlands. Seit 2013 tritt der Hamburger Sushi-Spezialist in der VOX-Show «Grill den Henssler» gegen Prominente an. In Hamburg betreibt er mehrere Gastro-Konzepte, darunter das Restaurant Henssler Henssler und die Ahoi-Kette."
