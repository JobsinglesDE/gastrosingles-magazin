intro: "Tim Raue ist einer der renommiertesten Köche Deutschlands. Sein Restaurant Tim Raue in Berlin trägt seit 2012 zwei Michelin-Sterne und gehörte mehrfach zu den besten 50 Restaurants der Welt. Der gebürtige Berliner ist bekannt für seine asiatisch geprägte Hochküche und als Teilnehmer von «Kitchen Impossible» auf VOX."
