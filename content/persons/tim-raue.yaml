    answer: "Tim Raue wurde am 31. März 1974 in Berlin-Kreuzberg geboren und ist damit Jahrgang 1974."
  - question: Wie viele Michelin-Sterne hat Tim Raue?
    answer: "Das Restaurant Tim Raue in Berlin hält seit 2012 zwei Michelin-Sterne. Es zählte mehrfach zu den World's 50 Best Restaurants."
