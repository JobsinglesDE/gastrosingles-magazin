intro: "Léa Linster ist die einzige Frau, die den Bocuse d'Or gewann — 1989 in Lyon mit ihrem Lammrücken im Kartoffelmantel. Die luxemburgische Sterneköchin führte jahrzehntelang ihr Restaurant in Frisange und ist als TV-Köchin aus ZDF-Sendungen bekannt."
