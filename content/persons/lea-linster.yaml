faqItems:
  - question: "Wann gewann Léa Linster den Bocuse d'Or?"
    answer: "1989 in Lyon. Mit ihrem Sieger-Gericht Lammrücken im Kartoffelmantel war sie die erste und bis heute einzige Frau auf der Siegerliste des wichtigsten Kochwettbewerbs der Welt."
  - question: "Wie alt ist Léa Linster?"
    answer: "Léa Linster wurde am 27. April 1955 in Differdingen in Luxemburg geboren und ist damit 71 Jahre alt."
  - question: "Wer führt das Restaurant Léa Linster heute?"
    answer: "Ihr Sohn Louis Linster. Er übernahm 2019 und führt das Haus unter seinem eigenen Namen. 2025 erkochte er den zweiten Michelin-Stern."
