faqItems:
  - question: Wie alt ist Johann Lafer?
    answer: "Johann Lafer wurde am 27. September 1957 in St. Stefan im Rosental in der Steiermark geboren und ist damit Jahrgang 1957."
  - question: Wie viele Michelin-Sterne hatte Johann Lafer?
    answer: "Johann Lafer führte sein Restaurant Le Val d'Or auf der Stromburg zeitweise mit zwei Michelin-Sternen — diese Auszeichnung hielt er von 1987 bis 2009. Einen Stern trug das Restaurant von 1983 bis zur Schließung 2019."
  - question: Was ist Johann Lafer heute?
    answer: "Seit Mai 2024 ist Johann Lafer mit der täglichen Sendung «Drei Teller für Lafer» auf Sat.1 zu sehen und moderiert weiterhin «Die Küchenschlacht» im ZDF. Im Mai 2026 machte er seine Krebserkrankung (Non-Hodgkin-Lymphom) öffentlich und zeigt sich kämpferisch."
takeaways:
  - Johann Lafer wurde am 27. September 1957 im österreichischen St. Stefan im Rosental geboren
  - Sein Restaurant Le Val d'Or auf der Stromburg trug von 1987 bis 2009 zwei Michelin-Sterne
  - Von 2006 bis 2017 moderierte er «Lafer! Lichter! Lecker!» im ZDF gemeinsam mit Horst Lichter
  - Im Mai 2026 machte er seine Diagnose Non-Hodgkin-Lymphom öffentlich und befindet sich in Behandlung
