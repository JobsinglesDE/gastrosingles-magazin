intro: "Johann Lafer ist einer der bekanntesten Sterneköche Deutschlands und Österreichs. Der gebürtige Steirer kochte mit zwei Michelin-Sternen auf der Stromburg in Rheinland-Pfalz und erreichte durch Sendungen wie «Lafer! Lichter! Lecker!» im ZDF ein Millionenpublikum."
