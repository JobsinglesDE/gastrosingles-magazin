intro: "Cornelia Poletto ist eine der bekanntesten Köchinnen Deutschlands. Die gebürtige Hamburgerin führte ihr erstes Restaurant Poletto in Eppendorf von 2000 bis 2010 mit einem Michelin-Stern. Heute betreibt sie in Hamburg-Eppendorf ihr Restaurant, eine Kochschule und eine Pizzeria — und ist als Moderatorin der ZDF «Küchenschlacht» im Fernsehen präsent."
