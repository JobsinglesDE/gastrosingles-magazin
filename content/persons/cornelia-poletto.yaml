faqItems:
  - question: Wie alt ist Cornelia Poletto?
    answer: "Cornelia Poletto wurde am 9. August 1971 in Hamburg geboren und ist damit Jahrgang 1971."
  - question: Hat Cornelia Poletto einen Michelin-Stern?
    answer: "Cornelia Poletto hielt von 2005 bis 2010 einen Michelin-Stern für ihr erstes Restaurant Poletto in Hamburg-Eppendorf. Nach der Schließung 2010 eröffnete sie ein neues Restaurant ohne Stern-Anspruch."
  - question: Wo kann man Cornelia Poletto im Fernsehen sehen?
    answer: "Cornelia Poletto ist als Moderatorin der ZDF-Sendung «Die Küchenschlacht» bekannt. Sie war außerdem bei «Polettos Kochschule» (NDR) und trat mehrfach in «Kitchen Impossible» auf VOX auf."
