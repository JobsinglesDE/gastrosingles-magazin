name: Tommy Honold
role: Küchenmeister, Gründer & Dating-Experte
bio: >-
  Küchenmeister, Marine-Feldkoch, CEO — und seit 2008 der Mann hinter dem grössten
  Berufs-Dating-Netzwerk im DACH-Raum. Tommy Honold bringt mit gastrosingles.de
  Köche, Sommeliers, Servicekräfte und Wirte zusammen, die wissen, wie
  Schichtdienst, Sonntagsservice und der Druck am Pass wirklich wiegen.
longBio: >-
  Tommy Honold, geboren 1977 am Bodensee, ist Küchenmeister mit IHK-Abschluss und
  einem Lebenslauf, der eigentlich klar auf Spitzenküche zugelaufen wäre — und
  irgendwie bei einem Dating-Netzwerk für Berufe gelandet ist.

  Er fing da an, wo die meisten aufhören würden: in der Küche seines Vaters. Die
  Mettnaustube in Radolfzell war sein erstes Klassenzimmer, hier hat er die
  Ausbildung zum Koch begonnen und die Disziplin gelernt, die jeden Service-Abend
  trägt. Danach kam die Meisterprüfung — Küchenmeister statt Plateau, weil ihn
  das Führen einer Brigade mehr interessierte als die nächste Garnitur. Die
  Marine schickte ihn anschliessend als Feldkoch um die Welt: kochen für viele,
  unter Druck, mit dem, was da ist. Eine Schule, die jeder Küchenchef mitbringen
  sollte, bevor er das erste Mal "Service!" ruft.

  2008 dann der Bruch: die erste Dating-Plattform. Was als Idee für Landwirte
  begann, ist heute das Jobsingles-Netzwerk mit fünf spezialisierten Plattformen.
  gastrosingles.de ist die jüngste davon — und für Tommy die persönlichste,
  weil er selbst weiss, wie es ist, wenn die anderen essen gehen, während du
  am Pass stehst. Die Plattform richtet sich an Menschen, die wissen, dass eine
  Beziehung mehr aushalten muss als Sonntagsservice, doppelten Wiesn-Einsatz
  und 60-Stunden-Wochen im November. Tommy schreibt hier über Berufsalltag,
  Gastro-Vereine, Promi-Köche und die Frage, wie Partnersuche funktioniert,
  wenn dein Tag erst dann anfängt, wenn andere ihn beenden.
